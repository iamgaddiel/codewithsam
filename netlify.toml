[build]
  # Static site — the root already contains index.html.
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Optional: expose the webhook at a clean path in addition to the default
# /.netlify/functions/paystack-webhook endpoint.
[[redirects]]
  from = "/api/paystack-webhook"
  to = "/.netlify/functions/paystack-webhook"
  status = 200

# Starts a payment transaction server-side (registration form posts here).
[[redirects]]
  from = "/api/initialize-payment"
  to = "/.netlify/functions/initialize-payment"
  status = 200

# Payment verification used by the success page.
[[redirects]]
  from = "/api/verify-payment"
  to = "/.netlify/functions/verify-payment"
  status = 200

# Signed ImageKit upload credentials for the admin popup-image uploader.
[[redirects]]
  from = "/api/imagekit-auth"
  to = "/.netlify/functions/imagekit-auth"
  status = 200

# Clean URL for the admin panel.
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Clean URL for the post-payment success page.
[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

# Legacy /favicon.ico requests → the PNG icon.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon-32x32.png"
  status = 200
